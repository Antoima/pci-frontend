<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Interactivo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container-fluid p-0">
      <div class="row m-0">
        <div class="col-12 text-center p-0">
          <div class="panel">
            <div
              class="btn-group d-flex flex-column flex-md-row flex-wrap justify-content-center"
              role="group"
              aria-label="Opciones de menú"
            >
              <button
                type="button"
                class="btn btn-option"
                data-menu="menu1"
                onclick="showMenu('menu1')"
              >
                <i class="bi bi-file-earmark-text"></i> Completar brief
              </button>
              <button
                type="button"
                class="btn btn-option"
                data-menu="menu2"
                onclick="showMenu('menu2')"
              >
                <i class="bi bi-person-check"></i> Revisar y confirmar
              </button>
              <button
                type="button"
                class="btn btn-option"
                data-menu="menu3"
                onclick="showMenu('menu3')"
              >
                <i class="bi bi-send"></i> Enviar campaña
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="row m-0">
        <div class="col-12 p-0">
          <div id="menu-container" class="content-panel">
            <!-- Contenido dinámico del menú -->
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"></script>
    <script src="js/scripts.js"></script>
  </body>
</html>
